version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - WMS_TIMEOUT=30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    environment:
      - NEXT_PUBLIC_API_URL=
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sitescope.rule=Host(`red-flag-report.paskie.me`)"
      - "traefik.http.routers.sitescope.entrypoints=https"
      - "traefik.http.routers.sitescope.tls=true"
      - "traefik.http.routers.sitescope.tls.certresolver=letsencrypt"
      - "traefik.http.services.sitescope.loadbalancer.server.port=80"
      - "traefik.http.routers.sitescope-http.rule=Host(`red-flag-report.paskie.me`)"
      - "traefik.http.routers.sitescope-http.entrypoints=http"
      - "traefik.http.routers.sitescope-http.middlewares=sitescope-redirect"
      - "traefik.http.middlewares.sitescope-redirect.redirectscheme.scheme=https"
    restart: unless-stopped
    networks:
      - internal
      - coolify

networks:
  internal:
    driver: bridge
  coolify:
    external: true
